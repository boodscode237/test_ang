<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulleys: English Master Class</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&family=Inter:wght@400;600&display=swap');
        
        :root {
            --primary: #3b82f6;
            --secondary: #fbbf24;
            --accent: #10b981;
            --bg: #f8fafc;
        }

        body { font-family: 'Inter', sans-serif; background-color: #e2e8f0; overflow: hidden; }
        h1, h2, h3 { font-family: 'Poppins', sans-serif; }

        .slide-deck {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .slide {
            width: 90%;
            max-width: 1100px;
            height: 80%;
            background: white;
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            padding: 50px;
            position: relative;
            display: none;
            flex-direction: column;
            border: 6px solid var(--primary);
            overflow-y: auto;
        }

        .slide.active { display: flex; animation: fadeIn 0.5s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .mascot-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 140px;
            cursor: pointer;
            transition: transform 0.3s;
        }

        .mascot-container:hover { transform: scale(1.1); }

        .btn-nav {
            background: var(--primary);
            color: white;
            padding: 10px 25px;
            border-radius: 99px;
            font-weight: 800;
            transition: all 0.2s;
        }

        .btn-nav:hover { background: #1d4ed8; transform: translateY(-2px); }
        .btn-nav:disabled { opacity: 0.3; cursor: not-allowed; }

        .translation { color: #64748b; font-style: italic; font-size: 0.9em; }

        .tts-button {
            background: #fef3c7;
            border: 2px solid #fbbf24;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            margin-bottom: 10px;
        }

        .tts-button:hover { background: #fde68a; }

        .word-card {
            background: #eff6ff;
            border: 2px solid #bfdbfe;
            border-radius: 15px;
            padding: 15px;
            text-align: center;
        }

        .reading-box {
            background: #f9fafb;
            border-left: 5px solid var(--accent);
            padding: 20px;
            font-size: 1.1em;
            line-height: 1.6;
        }

        .progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            height: 8px;
            background: var(--secondary);
            transition: width 0.3s;
        }
    </style>
</head>
<body>

    <div class="slide-deck" id="deck">
        <!-- Slides will be injected by JavaScript -->
    </div>

    <!-- Navigation Overlay -->
    <div class="fixed bottom-6 w-full flex justify-center gap-10 items-center z-50">
        <button id="prevBtn" class="btn-nav" onclick="prevSlide()">BACK</button>
        <span id="slideCounter" class="font-bold text-slate-600 bg-white px-4 py-1 rounded-full shadow-sm">1 / 40</span>
        <button id="nextBtn" class="btn-nav" onclick="nextSlide()">NEXT</button>
    </div>

    <script>
        const apiKey = ""; // Provided by environment
        let currentSlide = 0;
        const totalSlides = 40;

        // Content for 40 slides
        const slidesData = [
            { type: 'title', title: 'Lifting the World', subtitle: 'Pulleys Master Class', russian: 'Поднимая мир: Мастер-класс по блокам', mascotTalk: 'Hello everyone! I am Robo-Rex. Today, we learn about pulleys!' },
            { type: 'intro', title: 'Meet Robo-Rex', text: 'Robo-Rex is a robot at IT Cube. He needs your help to lift a heavy box.', russian: 'Робо-Рекс — робот из IT-куба. Ему нужна помощь!', mascotTalk: 'Click me to hear my voice!' },
            { type: 'vocab', title: 'Vocabulary: The Wheel', word: 'Wheel', trans: 'Колесо', example: 'The wheel is round.', mascotTalk: 'Wheel. W-H-E-E-L.' },
            { type: 'vocab', title: 'Vocabulary: The Rope', word: 'Rope', trans: 'Канат / Трос', example: 'The rope is strong.', mascotTalk: 'Rope. R-O-P-E.' },
            { type: 'vocab', title: 'Vocabulary: The Axle', word: 'Axle', trans: 'Ось', example: 'The wheel turns on the axle.', mascotTalk: 'Axle. A-X-L-E.' },
            { type: 'vocab', title: 'Vocabulary: The Groove', word: 'Groove', trans: 'Желоб', example: 'The rope sits in the groove.', mascotTalk: 'Groove. G-R-O-O-V-E.' },
            { type: 'reading', title: 'Reading: What is a Pulley?', text: 'A pulley is a simple machine. It has a wheel and a rope. People use it to move heavy objects easily.', russian: 'Блок — это простой механизм. У него есть колесо и канат. Люди используют его для легкого перемещения тяжелых предметов.', mascotTalk: 'Read this slowly with me.' },
            { type: 'listening', title: 'Listening: Find the Part', task: 'Listen to Robo-Rex. Which part is he talking about?', options: ['Wheel', 'Rope', 'Axle'], correct: 1, mascotTalk: 'This part is long and strong. It is made of many strings.' },
            { type: 'grammar', title: 'Grammar: Comparing Things', rule: 'Adjective + -er', example: 'This rope is long. That rope is longER.', russian: 'Сравнительная степень: Длинный -> Длиннее', mascotTalk: 'Remember to add E-R at the end!' },
            { type: 'grammar', title: 'Grammar Practice', task: 'Make it better:', items: ['Strong -> Stronger', 'Easy -> Easier', 'Heavy -> Heavier'], mascotTalk: 'Can you say these out loud?' },
            { type: 'reading', title: 'Reading: The Fixed Pulley', text: 'A fixed pulley stays in one place. It changes the direction of the force. If you pull down, the load goes up.', russian: 'Неподвижный блок остается на месте. Он меняет направление силы.', mascotTalk: 'Direction is very important.' },
            { type: 'vocab', title: 'New Word: Direction', word: 'Direction', trans: 'Направление', example: 'Up and Down are directions.', mascotTalk: 'Direction.' },
            { type: 'vocab', title: 'New Word: Lift', word: 'Lift', trans: 'Поднимать', example: 'I lift the box.', mascotTalk: 'Lift.' },
            { type: 'listening', title: 'Listening Challenge', task: 'What direction does the box go if you pull down?', options: ['Down', 'Up', 'Left'], correct: 1, mascotTalk: 'If I pull the rope down, the heavy box goes up!' },
            { type: 'reading', title: 'Reading: The Movable Pulley', text: 'A movable pulley is different. It moves with the load. It makes the work easier because the rope supports the weight.', russian: 'Подвижный блок двигается вместе с грузом. Он облегчает работу.', mascotTalk: 'Movable. M-O-V-A-B-L-E.' },
            { type: 'vocab', title: 'New Word: Support', word: 'Support', trans: 'Поддерживать', example: 'The rope supports the load.', mascotTalk: 'Support.' },
            { type: 'grammar', title: 'Grammar: Zero Conditional', rule: 'If + [Present], [Present]', example: 'If you pull the rope, the box moves.', russian: 'Если ты тянешь канат, коробка двигается.', mascotTalk: 'This is a scientific law!' },
            { type: 'grammar', title: 'Grammar Practice', task: 'Complete the sentence:', text: 'If we use two pulleys, the work _______ easier.', options: ['is', 'are', 'be'], correct: 0, mascotTalk: 'Choose the correct verb.' },
            { type: 'reading', title: 'Reading: The Hoist', text: 'A hoist is a team of pulleys. It combines fixed and movable pulleys. Large ships use hoists to lift heavy sails.', russian: 'Таль — это группа блоков. Большие корабли используют их для парусов.', mascotTalk: 'Teamwork makes the dream work!' },
            { type: 'vocab', title: 'New Word: Combine', word: 'Combine', trans: 'Соединять', example: 'We combine two pulleys.', mascotTalk: 'Combine.' },
            { type: 'listening', title: 'Listening: Vocabulary Check', task: 'Which word means "a team of pulleys"?', options: ['Fixed', 'Axle', 'Hoist'], correct: 2, mascotTalk: 'A hoist is a special system with many pulleys.' },
            { type: 'grammar', title: 'Grammar: Conditional Logic', task: 'Finish the thought:', text: 'If the rope breaks, the load _______ down.', options: ['falls', 'fall', 'falling'], correct: 0, mascotTalk: 'Gravity is fast!' },
            { type: 'reading', title: 'Reading: History', text: 'Ancient people used pulleys to build the pyramids. They moved giant stones. They were very smart engineers.', russian: 'Древние люди использовали блоки для строительства пирамид.', mascotTalk: 'Engineers are like superheroes.' },
            { type: 'vocab', title: 'New Word: Ancient', word: 'Ancient', trans: 'Древний', example: 'Egypt is an ancient country.', mascotTalk: 'Ancient.' },
            { type: 'listening', title: 'Listening: Facts', task: 'Did ancient people have motors?', options: ['Yes', 'No'], correct: 1, mascotTalk: 'They did not have motors, so they used pulleys and hands.' },
            { type: 'grammar', title: 'Grammar: Comparatives Part 2', rule: 'More + [Long Adjective]', example: 'A hoist is MORE efficient than one pulley.', russian: 'Более + длинное прилагательное', mascotTalk: 'Efficient. E-F-F-I-C-I-E-N-T.' },
            { type: 'reading', title: 'Reading: Robotics', text: 'At IT Cube, we build robots. Robots use pulleys and belts to move arms and legs. We need to be precise.', russian: 'В IT-кубе мы строим роботов. Мы используем блоки и ремни.', mascotTalk: 'Precision is key in coding.' },
            { type: 'vocab', title: 'New Word: Precise', word: 'Precise', trans: 'Точный', example: 'Robots are very precise.', mascotTalk: 'Precise.' },
            { type: 'listening', title: 'Listening: Instructions', task: 'Robo-Rex says:', mascotTalk: 'Pick up the blue block and move it to the right!' },
            { type: 'vocab', title: 'New Word: Friction', word: 'Friction', trans: 'Трение', example: 'Oil reduces friction.', mascotTalk: 'Friction. F-R-I-C-T-I-O-N.' },
            { type: 'reading', title: 'Reading: Safety', text: 'Safety is number one. If you see a broken rope, stop! Pulleys are powerful machines.', russian: 'Безопасность — номер один. Если канат порван, остановись!', mascotTalk: 'Be careful in the lab.' },
            { type: 'listening', title: 'Listening: Safety Rules', task: 'What should you do if the rope is broken?', options: ['Pull it', 'Fix it', 'Stop'], correct: 2, mascotTalk: 'If the rope is broken, you must stop immediately!' },
            { type: 'vocab', title: 'New Word: Powerful', word: 'Powerful', trans: 'Мощный', example: 'The motor is powerful.', mascotTalk: 'Powerful.' },
            { type: 'grammar', title: 'Grammar Review', task: 'Which sentence is correct?', options: ['This pulley is stronger.', 'This pulley is more strong.'], correct: 0, mascotTalk: 'Strong is a short word.' },
            { type: 'reading', title: 'Reading: The Elevator', text: 'Every elevator has a pulley system. There is a counterweight on the other side. This keeps the car balanced.', russian: 'В каждом лифте есть система блоков. Там есть противовес.', mascotTalk: 'Balance. B-A-L-A-N-C-E.' },
            { type: 'vocab', title: 'New Word: Balance', word: 'Balance', trans: 'Баланс', example: 'The weights are in balance.', mascotTalk: 'Balance.' },
            { type: 'listening', title: 'Listening: Final Quiz', task: 'Listen to the word and click it:', mascotTalk: 'Movable.' },
            { type: 'listening', title: 'Listening: Final Quiz', task: 'Listen to the word and click it:', mascotTalk: 'Effort.' },
            { type: 'conclusion', title: 'Mission Complete!', text: 'You are now a Pulley Master. You know the words, the grammar, and the stories.', russian: 'Вы теперь мастера по блокам!', mascotTalk: 'Great job, students! See you in the IT Cube!' },
            { type: 'final', title: 'GG WP!', text: 'Thank you for playing and learning.', mascotTalk: 'Good Game, Well Played!' }
        ];

        function createSlide(index) {
            const data = slidesData[index];
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === currentSlide ? ' active' : '');
            slide.id = `slide-${index}`;

            let content = '';
            switch(data.type) {
                case 'title':
                    content = `
                        <div class="flex-grow flex flex-col justify-center items-center text-center">
                            <h1 class="text-6xl mb-4">${data.title}</h1>
                            <h2 class="text-3xl text-blue-600 mb-6 font-bold">${data.subtitle}</h2>
                            <p class="translation">${data.russian}</p>
                        </div>
                    `;
                    break;
                case 'vocab':
                    content = `
                        <h2 class="slide-title">${data.title}</h2>
                        <div class="flex-grow flex flex-col justify-center items-center">
                            <div class="word-card w-64 shadow-lg mb-6">
                                <span class="text-4xl font-black block">${data.word}</span>
                                <span class="translation block mt-2">${data.trans}</span>
                            </div>
                            <p class="text-2xl text-center italic">"${data.example}"</p>
                        </div>
                    `;
                    break;
                case 'reading':
                    content = `
                        <h2 class="slide-title">${data.title}</h2>
                        <div class="flex-grow flex flex-col justify-center">
                            <div class="reading-box shadow-sm mb-6">${data.text}</div>
                            <p class="translation">${data.russian}</p>
                        </div>
                    `;
                    break;
                case 'listening':
                    content = `
                        <h2 class="slide-title">${data.title}</h2>
                        <div class="flex-grow flex flex-col justify-center">
                            <p class="text-2xl font-bold mb-6">${data.task}</p>
                            ${data.options ? `
                                <div class="grid grid-cols-1 gap-4">
                                    ${data.options.map((opt, i) => `
                                        <button class="bg-white border-2 border-slate-200 p-4 rounded-xl text-left hover:bg-blue-50" onclick="checkAnswer(${i}, ${data.correct}, this)">
                                            ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    `;
                    break;
                case 'grammar':
                    content = `
                        <h2 class="slide-title">${data.title}</h2>
                        <div class="flex-grow flex flex-col justify-center">
                            <div class="bg-blue-900 text-white p-8 rounded-3xl mb-6 shadow-xl">
                                <h3 class="text-yellow-400 mb-2">${data.rule}</h3>
                                <p class="text-2xl font-bold mb-4">${data.example}</p>
                                <span class="text-blue-200 italic">${data.russian}</span>
                            </div>
                            ${data.items ? `<ul class="list-disc ml-10 space-y-2 text-xl font-bold">${data.items.map(it => `<li>${it}</li>`).join('')}</ul>` : ''}
                            ${data.options ? `
                                <div class="grid grid-cols-1 gap-4 mt-4">
                                    <p class="text-xl font-bold mb-2">${data.text}</p>
                                    ${data.options.map((opt, i) => `
                                        <button class="bg-white border-2 border-slate-200 p-4 rounded-xl text-left hover:bg-blue-50" onclick="checkAnswer(${i}, ${data.correct}, this)">
                                            ${opt}
                                        </button>
                                    `).join('')}
                                </div>
                            ` : ''}
                        </div>
                    `;
                    break;
                default:
                    content = `<div class="flex-grow flex flex-col justify-center items-center text-center"><h1 class="text-4xl">${data.title}</h1><p class="text-2xl mt-4">${data.text}</p><p class="translation mt-2">${data.russian || ''}</p></div>`;
            }

            slide.innerHTML = `
                <div class="progress-bar" style="width: ${((index + 1) / totalSlides) * 100}%"></div>
                <div class="flex flex-col h-full">
                    ${content}
                    <div class="mascot-container" onclick="playMascotTalk(${index})">
                        <div class="tts-button mx-auto no-print">
                            <i class="fa-solid fa-volume-high"></i>
                        </div>
                        <img src="http://googleusercontent.com/image_collection/image_retrieval/7893109736131601394" alt="Robo-Rex">
                        <div class="text-[10px] text-center font-bold text-slate-400 uppercase mt-1">Listen to Rex</div>
                    </div>
                </div>
            `;
            return slide;
        }

        async function playMascotTalk(index) {
            const text = slidesData[index].mascotTalk;
            if (!text) return;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: `Say in a friendly, enthusiastic robotic voice: ${text}` }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Puck" } } }
                        }
                    })
                });

                const result = await response.json();
                const audioData = result.candidates[0].content.parts[0].inlineData.data;
                const sampleRate = parseInt(result.candidates[0].content.parts[0].inlineData.mimeType.split('rate=')[1]);

                playPCM(audioData, sampleRate);
            } catch (err) {
                console.error("TTS Error:", err);
            }
        }

        function playPCM(base64Data, sampleRate) {
            const binaryString = atob(base64Data);
            const len = binaryString.length;
            const bytes = new Uint8Array(len);
            for (let i = 0; i < len; i++) bytes[i] = binaryString.charCodeAt(i);
            
            const pcmData = new Int16Array(bytes.buffer);
            const wavData = createWav(pcmData, sampleRate);
            const blob = new Blob([wavData], { type: 'audio/wav' });
            const url = URL.createObjectURL(blob);
            const audio = new Audio(url);
            audio.play();
        }

        function createWav(samples, sampleRate) {
            const buffer = new ArrayBuffer(44 + samples.length * 2);
            const view = new DataView(buffer);
            const writeString = (offset, string) => {
                for (let i = 0; i < string.length; i++) view.setUint8(offset + i, string.charCodeAt(i));
            };
            writeString(0, 'RIFF');
            view.setUint32(4, 36 + samples.length * 2, true);
            writeString(8, 'WAVE');
            writeString(12, 'fmt ');
            view.setUint32(16, 16, true);
            view.setUint16(20, 1, true);
            view.setUint16(22, 1, true);
            view.setUint32(24, sampleRate, true);
            view.setUint32(28, sampleRate * 2, true);
            view.setUint16(32, 2, true);
            view.setUint16(34, 16, true);
            writeString(36, 'data');
            view.setUint32(40, samples.length * 2, true);
            for (let i = 0; i < samples.length; i++) view.setInt16(44 + i * 2, samples[i], true);
            return buffer;
        }

        function checkAnswer(selected, correct, btn) {
            if (selected === correct) {
                btn.style.borderColor = "#10b981";
                btn.style.backgroundColor = "#ecfdf5";
                btn.innerHTML += ' ✅';
            } else {
                btn.style.borderColor = "#ef4444";
                btn.style.backgroundColor = "#fef2f2";
                btn.innerHTML += ' ❌';
            }
        }

        function nextSlide() {
            if (currentSlide < totalSlides - 1) {
                document.getElementById(`slide-${currentSlide}`).classList.remove('active');
                currentSlide++;
                document.getElementById(`slide-${currentSlide}`).classList.add('active');
                updateNav();
            }
        }

        function prevSlide() {
            if (currentSlide > 0) {
                document.getElementById(`slide-${currentSlide}`).classList.remove('active');
                currentSlide--;
                document.getElementById(`slide-${currentSlide}`).classList.add('active');
                updateNav();
            }
        }

        function updateNav() {
            document.getElementById('slideCounter').innerText = `${currentSlide + 1} / ${totalSlides}`;
            document.getElementById('prevBtn').disabled = currentSlide === 0;
            document.getElementById('nextBtn').disabled = currentSlide === totalSlides - 1;
        }

        // Initialize Slides
        const deck = document.getElementById('deck');
        slidesData.forEach((_, i) => deck.appendChild(createSlide(i)));
        updateNav();

    </script>
</body>
</html>
